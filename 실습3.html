<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>도형 서식 폼 만들기</title>
    </head>
    <body>
        <h3>도형 서식 폼 만들기</h3>
        <hr>
        <form>
            <p>선종류 <select name="line" size="3">
                <option value="1">선없음</option>
                <option value="2"selected>실선</option>
                <option value="3">점선</option>
            </select></p>
            <p>선두께 <input type="number" min="0" max="100" step="1">
                선색 <input type="color" value="#00ff00"></p>
            <p>투명도(0~100) <input type="range" min="0" max="100" list="temperatures"></p>
        </form>
    </body>
</html>
